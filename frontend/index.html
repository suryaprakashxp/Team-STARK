<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💊 PharmaGuard AI</title>
  <meta name="description" content="AI-powered drug interaction screener using RxNorm and Gemini." />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: {
              50:  '#eef2ff',
              100: '#e0e7ff',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              900: '#1e1b4b',
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Custom severity colours -->
  <link rel="stylesheet" href="style.css" />

  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Glassy card */
    .glass {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.12);
    }
    /* Animated gradient bg */
    .gradient-bg {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    /* Pulse ring on button while loading */
    .loading-pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
    /* Report text rendering */
    #report-content { white-space: pre-wrap; }
    /* Scrollbar for report area */
    #results::-webkit-scrollbar { width: 6px; }
    #results::-webkit-scrollbar-track { background: transparent; }
    #results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
  </style>
</head>
<body class="gradient-bg min-h-screen text-white flex flex-col items-center justify-start py-12 px-4">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="text-center mb-10">
    <div class="text-6xl mb-3 select-none">💊</div>
    <h1 class="text-4xl md:text-5xl font-bold tracking-tight">PharmaGuard AI</h1>
    <p class="mt-3 text-indigo-300 text-lg font-light max-w-md mx-auto">
      AI-powered drug interaction analysis — grounded in real RxNorm data, no hallucinations.
    </p>
  </header>

  <!-- ── Main card ──────────────────────────────────────────────────────── -->
  <main class="w-full max-w-2xl">
    <div class="glass rounded-2xl p-8 shadow-2xl">

      <!-- Medications input -->
      <div class="mb-6">
        <label for="medications" class="block text-sm font-semibold text-indigo-200 mb-2 uppercase tracking-widest">
          Medications
        </label>
        <input
          id="medications"
          type="text"
          placeholder="e.g. warfarin, aspirin, ibuprofen"
          class="w-full rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/40
                 px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-indigo-400
                 transition duration-200"
        />
        <p class="text-xs text-white/40 mt-1">Separate multiple drugs with commas.</p>
      </div>

      <!-- Clinical profile -->
      <div class="mb-8">
        <label for="profile" class="block text-sm font-semibold text-indigo-200 mb-2 uppercase tracking-widest">
          Clinical Profile
        </label>
        <textarea
          id="profile"
          rows="4"
          placeholder="e.g. 68-year-old male, history of atrial fibrillation, diabetes, CKD stage 3"
          class="w-full rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/40
                 px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-indigo-400
                 transition duration-200 resize-none"
        ></textarea>
      </div>

      <!-- Analyze button -->
      <button
        id="analyzeBtn"
        class="w-full py-4 rounded-xl bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700
               font-semibold text-lg tracking-wide transition-all duration-200
               shadow-lg hover:shadow-indigo-500/40 focus:outline-none focus:ring-2 focus:ring-indigo-300"
      >
        🔍 Analyze Interactions
      </button>

      <!-- Loading indicator -->
      <div id="loadingState" class="hidden mt-6 flex items-center justify-center gap-3 text-indigo-300">
        <svg class="loading-pulse h-6 w-6 text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span class="text-base font-medium">Querying RxNorm &amp; generating report…</span>
      </div>
      
      <!-- Empty State -->
       <div id="emptyState" class="hidden mt-6 text-center text-white/50 text-sm"></div>

    </div>

    <!-- ── Results panel ─────────────────────────────────────────────────── -->
    <div id="resultsContainer" class="hidden w-full mt-6 space-y-6">
      
      <div class="glass rounded-2xl p-6 shadow-2xl">
          <div class="flex justify-between items-center mb-6">
              <h2 class="text-xl font-bold text-indigo-200">Interaction Report</h2>
              <span id="reportBadge" class="px-3 py-1 bg-gray-100 text-gray-700 text-xs font-semibold rounded-full">WAITING</span>
          </div>
          
          <div id="patientContextDisplay" class="mb-6 pb-6 border-b border-white/10"></div>
          
          <div id="interactionCard" class="mb-6"></div>
          
          <div id="clinicalAdvice"></div>
          
          <div id="reportTimestamp" class="mt-6 text-xs text-white/30 text-right"></div>
      </div>
      
    </div>
  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer class="mt-12 text-center text-white/30 text-xs">
    Data sourced from <span class="text-indigo-400">NLM RxNorm API</span> · Report by
    <span class="text-indigo-400">Google Gemini 2.0 Flash</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
